<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DriveTree</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="panel hero">
        <div>
          <p class="eyebrow">Disk analyzer</p>
          <h1>DriveTree</h1>
          <p class="subtitle">
            폴더를 선택하면 파일 크기를 합산해서 WizTree 스타일의 트리맵으로
            가장 큰 폴더와 파일을 바로 찾을 수 있습니다.
          </p>
        </div>
        <div class="controls">
          <label class="file-picker" for="folderInput">폴더 선택</label>
          <input id="folderInput" type="file" webkitdirectory multiple />
          <button id="sampleButton" type="button" class="secondary">
            샘플 데이터 보기
          </button>
        </div>
      </header>

      <section class="panel summary" id="summary"></section>

      <section class="panel">
        <div class="toolbar">
          <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
          <p class="hint">사각형을 클릭하면 하위 폴더로 확대됩니다.</p>
        </div>
        <div id="treemap" class="treemap" aria-live="polite"></div>
      </section>

      <section class="panel">
        <div class="table-header">
          <h2>현재 폴더 상세</h2>
          <p id="tableDescription" class="hint"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th>종류</th>
                <th>크기</th>
                <th>비율</th>
              </tr>
            </thead>
            <tbody id="detailsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
